<!-- Chat Support Widget -->
<div id="chatWidget" class="chat-widget">
  <!-- Chat Toggle Button -->
  <button id="chatToggle" class="chat-toggle" title="Чат поддержки со встроенным ИИ Ollama">
    <span class="chat-icon">🤖</span>
  </button>

  <!-- Chat Box -->
  <div id="chatBox" class="chat-box">
    <div class="chat-header">
      <h3>Помощь по сайту</h3>
      <button id="chatClose" class="chat-close" title="Закрыть">✕</button>
    </div>

    <div id="chatMessages" class="chat-messages">
      <div class="chat-message bot-message">
        <div class="message-text">👋 Привет! Я здесь, чтобы помочь тебе с вопросами о наших услугах печати. Что ты хочешь узнать?</div>
      </div>
    </div>

    <div class="chat-input-area">
      <input 
        type="text" 
        id="chatInput" 
        class="chat-input" 
        placeholder="Напиши вопрос..." 
        autocomplete="off"
      />
      <button id="chatSend" class="chat-send" title="Отправить">
        <span>➤</span>
      </button>
    </div>
  </div>
</div>

<style>
:root {
  --chat-primary: #00d4ff;
  --chat-secondary: #ff006e;
  --chat-bg: #0f0f1e;
  --chat-surface: #1a1a2e;
  --chat-text: #e0e0e0;
}

.chat-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  z-index: 9999;
}

.chat-toggle {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #007acc 100%);
  border: 3px solid rgba(0, 212, 255, 0.9);
  color: var(--chat-bg);
  font-size: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
  font-weight: bold;
  box-shadow: 
    0 8px 25px rgba(0, 212, 255, 0.35),
    0 0 30px rgba(0, 212, 255, 0.25),
    inset 0 -2px 10px rgba(0, 0, 0, 0.2),
    inset 0 2px 10px rgba(255, 255, 255, 0.1);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  animation: float-up 3s ease-in-out infinite;
}

.chat-toggle::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 60%);
  pointer-events: none;
  border-radius: 50%;
}

@keyframes float-up {
  0%, 100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-8px);
  }
}

.chat-toggle:hover {
  transform: scale(1.15) translateY(-4px);
  box-shadow: 
    0 12px 35px rgba(0, 212, 255, 0.5),
    0 0 40px rgba(0, 212, 255, 0.4),
    inset 0 -2px 10px rgba(0, 0, 0, 0.2),
    inset 0 2px 10px rgba(255, 255, 255, 0.15);
}

.chat-toggle:active {
  transform: scale(1.05) translateY(-2px);
}

.chat-icon {
  position: relative;
  z-index: 2;
  display: inline-block;
  animation: robot-wave 2s ease-in-out infinite;
}

@keyframes robot-wave {
  0%, 100% {
    transform: rotate(0deg);
  }
  25% {
    transform: rotate(-8deg);
  }
  75% {
    transform: rotate(8deg);
  }
}

.chat-box {
  position: absolute;
  bottom: 80px;
  right: 0;
  width: 380px;
  height: 500px;
  background: linear-gradient(135deg, rgba(26, 26, 46, 0.98) 0%, rgba(15, 15, 30, 0.98) 100%);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 212, 255, 0.15);
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: all 0.3s ease;
}

.chat-box.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.chat-header {
  padding: 16px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-header h3 {
  margin: 0;
  color: var(--chat-primary);
  font-size: 16px;
  font-weight: 600;
}

.chat-close {
  background: none;
  border: none;
  color: var(--chat-text);
  font-size: 20px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.chat-close:hover {
  opacity: 1;
  color: var(--chat-secondary);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar {
  width: 6px;
}

.chat-messages::-webkit-scrollbar-track {
  background: rgba(0, 212, 255, 0.05);
  border-radius: 3px;
}

.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(0, 212, 255, 0.2);
  border-radius: 3px;
}

.chat-messages::-webkit-scrollbar-thumb:hover {
  background: rgba(0, 212, 255, 0.4);
}

.chat-message {
  display: flex;
  gap: 8px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.user-message {
  justify-content: flex-end;
}

.message-text {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 10px;
  word-wrap: break-word;
  line-height: 1.4;
  font-size: 14px;
}

.user-message .message-text {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 180, 220, 0.15));
  border: 1px solid rgba(0, 212, 255, 0.3);
  color: var(--chat-text);
}

.bot-message .message-text {
  background: rgba(255, 0, 110, 0.08);
  border: 1px solid rgba(255, 0, 110, 0.2);
  color: var(--chat-text);
}

.loading-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 10px 14px;
}

.loading-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--chat-primary);
  animation: pulse 1.4s infinite;
}

.loading-dot:nth-child(2) {
  animation-delay: 0.2s;
}

.loading-dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes pulse {
  0%, 60%, 100% {
    opacity: 0.3;
  }
  30% {
    opacity: 1;
  }
}

.chat-input-area {
  padding: 12px;
  border-top: 1px solid rgba(0, 212, 255, 0.2);
  display: flex;
  gap: 8px;
}

.chat-input {
  flex: 1;
  padding: 10px 12px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 6px;
  color: var(--chat-text);
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}

.chat-input:focus {
  border-color: var(--chat-primary);
  box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
  background: rgba(0, 212, 255, 0.05);
}

.chat-input::placeholder {
  color: rgba(224, 224, 224, 0.5);
}

.chat-send {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--chat-primary), #0099cc);
  border: 1px solid var(--chat-primary);
  border-radius: 6px;
  color: var(--chat-bg);
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.chat-send:hover:not(:disabled) {
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
  transform: translateY(-2px);
}

.chat-send:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

@media (max-width: 480px) {
  .chat-box {
    width: calc(100vw - 40px);
    height: 60vh;
    max-height: 500px;
    bottom: 80px;
    right: 20px;
    left: 20px;
  }

  .chat-toggle {
    bottom: 20px;
    right: 20px;
  }
}
</style>

<script>
const chatToggle = document.getElementById('chatToggle');
const chatBox = document.getElementById('chatBox');
const chatClose = document.getElementById('chatClose');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

// Toggle chat box
chatToggle.addEventListener('click', () => {
  chatBox.classList.toggle('active');
  if (chatBox.classList.contains('active')) {
    chatInput.focus();
  }
});

chatClose.addEventListener('click', () => {
  chatBox.classList.remove('active');
});

// Send message
async function sendMessage() {
  const message = chatInput.value.trim();
  if (!message) return;

  // Add user message to chat
  addMessage(message, 'user');
  chatInput.value = '';
  chatSend.disabled = true;

  // Show loading indicator
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'chat-message bot-message';
  loadingDiv.id = 'loading-indicator';
  loadingDiv.innerHTML = `
    <div class="loading-indicator">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  `;
  chatMessages.appendChild(loadingDiv);
  scrollToBottom();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    const data = await response.json();
    
    // Remove loading indicator
    loadingDiv.remove();

    if (data.ok) {
      addMessage(data.response, 'bot');
    } else {
      addMessage('Извини, произошла ошибка. Попробуй еще раз позже.', 'bot');
    }
  } catch (error) {
    console.error('Chat error:', error);
    loadingDiv.remove();
    addMessage('Ошибка подключения. Убедись, что сервер работает.', 'bot');
  }

  chatSend.disabled = false;
  chatInput.focus();
}

function addMessage(text, sender) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `chat-message ${sender}-message`;
  
  const textDiv = document.createElement('div');
  textDiv.className = 'message-text';
  textDiv.textContent = text;
  
  messageDiv.appendChild(textDiv);
  chatMessages.appendChild(messageDiv);
  
  scrollToBottom();
}

function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Event listeners
chatSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Close chat on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && chatBox.classList.contains('active')) {
    chatBox.classList.remove('active');
  }
});
</script>
