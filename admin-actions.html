<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логирование действий - ООО КОНСТАНТА</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .actions-filters {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .filter-group input,
        .filter-group select {
            padding: 12px 16px;
            background: rgba(26, 26, 46, 0.5);
            border: 1.5px solid rgba(0, 212, 255, 0.2);
            border-radius: 4px;
            color: var(--text-light);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            min-width: 220px;
        }

        .filter-group input::placeholder {
            color: var(--text-muted);
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(26, 26, 46, 0.8);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }

        .actions-table-wrapper {
            overflow-x: auto;
            border-radius: 6px;
            border: 1.5px solid rgba(0, 212, 255, 0.15);
            background: rgba(26, 26, 46, 0.4);
        }

        .actions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .actions-table th {
            background: rgba(0, 212, 255, 0.05);
            padding: 18px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            border-bottom: 1.5px solid rgba(0, 212, 255, 0.1);
        }

        .actions-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.05);
            color: var(--text-light);
            font-size: 14px;
        }

        .actions-table tr:hover {
            background: rgba(0, 212, 255, 0.03);
        }

        .action-time {
            color: var(--text-muted);
            font-size: 13px;
        }

        .action-user {
            color: var(--accent);
            font-weight: 600;
        }

        .action-type-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .action-type-login {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .action-type-logout {
            background: rgba(255, 0, 110, 0.15);
            color: #ff006e;
            border: 1px solid rgba(255, 0, 110, 0.3);
        }

        .action-type-register {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .action-type-order {
            background: rgba(255, 0, 110, 0.1);
            color: #ff006e;
            border: 1px solid rgba(255, 0, 110, 0.2);
        }

        .action-type-failed {
            background: rgba(255, 100, 100, 0.15);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        .action-type-admin {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .details-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 1px dotted rgba(0, 212, 255, 0.3);
        }

        .details-link:hover {
            border-bottom-color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--accent);
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .stat-card {
            padding: 30px;
            border: 1.5px solid rgba(0, 212, 255, 0.15);
            border-radius: 6px;
            background: rgba(26, 26, 46, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 212, 255, 0.05);
            transition: top 0.4s ease;
            z-index: -1;
        }

        .stat-card:hover {
            border-color: var(--accent);
            background: rgba(26, 26, 46, 0.7);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.15);
        }

        .stat-card:hover::before {
            top: 0;
        }

        .stat-number {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 15px;
            font-family: 'Georgia', serif;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(15, 15, 30, 0.95) 100%);
            border: 1.5px solid rgba(0, 212, 255, 0.2);
            border-radius: 6px;
            padding: 40px;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            animation: slideInUp 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 30px;
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--accent);
            transform: rotate(90deg);
        }

        .modal-content {
            color: var(--text-light);
        }

        .modal-field {
            margin-bottom: 25px;
        }

        .modal-field-label {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .modal-field-value {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.6;
            padding: 12px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 2px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .modal-field-json {
            background: rgba(0, 212, 255, 0.02);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            padding: 15px;
            margin-top: 10px;
            font-size: 12px;
            overflow-x: auto;
        }

        .search-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent) 0%, #00a8cc 100%);
            color: var(--primary);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.25);
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00a8cc 0%, var(--accent) 100%);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.35);
        }

        .search-btn:hover::before {
            left: 0;
        }

        .top-users-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .user-card {
            padding: 20px;
            border: 1.5px solid rgba(0, 212, 255, 0.15);
            border-radius: 6px;
            background: rgba(26, 26, 46, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .user-card:hover {
            border-color: var(--accent);
            background: rgba(26, 26, 46, 0.7);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.15);
        }

        .user-name {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .user-count {
            font-size: 24px;
            color: var(--text-light);
            font-weight: 700;
        }

        .user-count-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        @media (max-width: 1024px) {
            .admin-container {
                padding: 50px 30px;
            }

            .actions-filters {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            .filter-group input,
            .filter-group select {
                min-width: 100%;
            }

            .actions-table {
                font-size: 13px;
            }

            .actions-table td,
            .actions-table th {
                padding: 12px 10px;
            }
        }

        @media (max-width: 768px) {
            .modal-box {
                padding: 25px;
                max-width: 95vw;
            }

            .stat-number {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
<nav class="nav">
    <div class="logo">КОН5ТАНТА</div>
    <div class="menu">
        <a href="/">Главная</a>
        <a href="/admin">← Админ-панель</a>
        <button onclick="logout()" style="background: var(--accent-alt)">Выход</button>
    </div>
</nav>

<div class="admin-container">
    <h1>Логирование действий</h1>

    <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="switchTab('recent')">📋 Последние действия</button>
        <button class="admin-tab-btn" onclick="switchTab('stats')">📈 Статистика</button>
    </div>

    <!-- Recent Actions Tab -->
    <div id="recent" class="admin-tab-content active">
        <h2>Все действия пользователей</h2>

        <div class="admin-section">
            <div class="actions-filters">
                <div class="filter-group">
                    <label>Поиск по пользователю</label>
                    <input type="text" id="filterUser" placeholder="Введите имя пользователя..." onkeyup="filterTable()">
                </div>
                <div class="filter-group">
                    <label>Тип действия</label>
                    <select id="filterType" onchange="filterTable()">
                        <option value="">Все типы</option>
                        <option value="LOGIN">✓ Вход</option>
                        <option value="LOGOUT">← Выход</option>
                        <option value="REGISTER">📝 Регистрация</option>
                        <option value="ORDER_CREATED">🛒 Создан заказ</option>
                        <option value="LOGIN_FAILED">✗ Неудачный вход</option>
                    </select>
                </div>
                <button class="search-btn" onclick="loadActions()">Найти</button>
            </div>
        </div>

        <div class="admin-section">
            <div class="loading" id="loading" style="display:none;">⏳ Загрузка данных...</div>
            <div class="actions-table-wrapper">
                <table class="actions-table">
                    <thead>
                        <tr>
                            <th>Время</th>
                            <th>Пользователь</th>
                            <th>Действие</th>
                            <th>Описание</th>
                            <th>Детали</th>
                        </tr>
                    </thead>
                    <tbody id="actionsBody">
                        <tr><td colspan="5" class="no-data">💼 Загрузите данные или подождите...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Statistics Tab -->
    <div id="stats" class="admin-tab-content">
        <h2>Статистика действий</h2>
        <div id="statsContainer">
            <div class="loading">⏳ Загрузка статистики...</div>
        </div>
    </div>
</div>

<!-- Details Modal -->
<div id="detailsModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <span>Детали действия</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-content" id="modalBody"></div>
    </div>
</div>

<script>
    let allActions = [];

    async function loadActions() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch('/api/admin/actions');
            const data = await response.json();
            if (data.ok) {
                allActions = data.actions || [];
                displayActions(allActions);
            }
        } catch (error) {
            console.error('Error loading actions:', error);
            document.getElementById('actionsBody').innerHTML = 
                '<tr><td colspan="5" class="no-data">❌ Ошибка при загрузке данных</td></tr>';
        }
        document.getElementById('loading').style.display = 'none';
    }

    function displayActions(actions) {
        const tbody = document.getElementById('actionsBody');
        if (actions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="no-data">📭 Нет действий для отображения</td></tr>';
            return;
        }

        tbody.innerHTML = actions.map(action => {
            const date = new Date(action.created);
            const timeStr = date.toLocaleString('ru-RU', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            const actionBadge = getActionBadge(action.action_type);
            return `
                <tr>
                    <td><span class="action-time">${timeStr}</span></td>
                    <td><span class="action-user">${escapeHtml(action.user)}</span></td>
                    <td><span class="action-type-badge ${actionBadge.class}">${actionBadge.text}</span></td>
                    <td>${escapeHtml(action.description)}</td>
                    <td><a class="details-link" data-action-id="${action.id}" onclick="showDetailsFromId(this)">Показать →</a></td>
                </tr>
            `;
        }).join('');
    }

    function filterTable() {
        const user = document.getElementById('filterUser').value.toLowerCase();
        const type = document.getElementById('filterType').value;

        const filtered = allActions.filter(action => {
            const matchUser = action.user.toLowerCase().includes(user);
            const matchType = type === '' || action.action_type === type;
            return matchUser && matchType;
        });

        displayActions(filtered);
    }

    function getActionBadge(actionType) {
        const badges = {
            'LOGIN': { text: '✓ ВХОД', class: 'action-type-login' },
            'LOGOUT': { text: '← ВЫХОД', class: 'action-type-logout' },
            'REGISTER': { text: '📝 РЕГИСТРАЦИЯ', class: 'action-type-register' },
            'ORDER_CREATED': { text: '🛒 ЗАКАЗ', class: 'action-type-order' },
            'LOGIN_FAILED': { text: '✗ ОШИБКА', class: 'action-type-failed' }
        };
        return badges[actionType] || { text: actionType, class: 'action-type-admin' };
    }

    function showDetailsFromId(element) {
        const actionId = element.getAttribute('data-action-id');
        const action = allActions.find(a => a.id == actionId);
        if (action) {
            showDetails(action);
        }
    }

    function showDetails(action) {
        const modal = document.getElementById('detailsModal');
        const modalBody = document.getElementById('modalBody');
        
        let details = {};
        if (typeof action.details === 'string' && action.details !== '{}') {
            try {
                details = JSON.parse(action.details);
            } catch (e) {
                details = { raw: action.details };
            }
        }

        const badge = getActionBadge(action.action_type);
        const date = new Date(action.created);
        const timeStr = date.toLocaleString('ru-RU', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        modalBody.innerHTML = `
            <div class="modal-field">
                <span class="modal-field-label">Пользователь</span>
                <div class="modal-field-value">${escapeHtml(action.user)}</div>
            </div>
            <div class="modal-field">
                <span class="modal-field-label">Тип действия</span>
                <div style="margin-top: 8px;"><span class="action-type-badge ${badge.class}">${badge.text}</span></div>
            </div>
            <div class="modal-field">
                <span class="modal-field-label">Описание</span>
                <div class="modal-field-value">${escapeHtml(action.description)}</div>
            </div>
            <div class="modal-field">
                <span class="modal-field-label">Время события</span>
                <div class="modal-field-value">${timeStr}</div>
            </div>
            ${action.ip_address ? `
            <div class="modal-field">
                <span class="modal-field-label">IP адрес</span>
                <div class="modal-field-value">${escapeHtml(action.ip_address)}</div>
            </div>
            ` : ''}
            ${Object.keys(details).length > 0 ? `
            <div class="modal-field">
                <span class="modal-field-label">Дополнительные данные</span>
                <div class="modal-field-json"><pre>${escapeHtml(JSON.stringify(details, null, 2))}</pre></div>
            </div>
            ` : ''}
        `;
        modal.classList.add('active');
    }

    function closeModal() {
        document.getElementById('detailsModal').classList.remove('active');
    }

    async function loadStatistics() {
        try {
            const response = await fetch('/api/admin/statistics');
            const data = await response.json();
            if (data.ok) {
                displayStatistics(data.stats, data.topUsers);
            }
        } catch (error) {
            console.error('Error loading statistics:', error);
        }
    }

    function displayStatistics(stats, topUsers) {
        let html = '<div class="admin-section"><h3>Статистика по типам действий</h3>';
        html += '<div class="stats-grid">';

        const typeNames = {
            'LOGIN': '✓ Входы',
            'LOGOUT': '← Выходы',
            'REGISTER': '📝 Регистрации',
            'ORDER_CREATED': '🛒 Заказы',
            'LOGIN_FAILED': '✗ Ошибки входа'
        };

        stats.forEach(stat => {
            const typeName = typeNames[stat.action_type] || stat.action_type;
            html += `
                <div class="stat-card">
                    <div class="stat-number">${stat.count}</div>
                    <div class="stat-label">${typeName}</div>
                </div>
            `;
        });

        html += '</div></div>';

        if (topUsers && topUsers.length > 0) {
            html += '<div class="admin-section"><h3>Топ активных пользователей</h3>';
            html += '<div class="top-users-list">';
            topUsers.forEach((user, index) => {
                html += `
                    <div class="user-card">
                        <div class="user-name">${index + 1}. ${escapeHtml(user.user)}</div>
                        <div class="user-count">${user.count}</div>
                        <div class="user-count-label">действий</div>
                    </div>
                `;
            });
            html += '</div></div>';
        }

        document.getElementById('statsContainer').innerHTML = html;
    }

    function switchTab(tabName) {
        document.querySelectorAll('.admin-tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.admin-tab-btn').forEach(el => el.classList.remove('active'));

        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');

        if (tabName === 'stats') {
            loadStatistics();
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    async function logout() {
        await fetch('/api/logout');
        location.href = '/auth';
    }

    window.addEventListener('load', loadActions);

    document.getElementById('detailsModal').addEventListener('click', function(event) {
        if (event.target === this) closeModal();
    });
</script>
<script src="/chat-widget.js"></script>
</body>
</html>
